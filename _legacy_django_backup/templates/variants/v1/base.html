{% load static %}<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}DMA. — Creative Production Agency{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,400;0,700;0,900;1,900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
<!-- Lenis CSS -->
<style>
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: hidden; }
  .lenis.lenis-smooth iframe { pointer-events: none; }
</style>
<style>
/* ─── ELECTRIC LIME: V1 Theme System ─────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root { --lime:#CCFF00; --black:#080808; --white:#F5F5F0; --gray:rgba(245,245,240,0.15); }
body { background:var(--black); color:var(--white); font-family:'Space Grotesk',sans-serif; cursor:none; overflow-x:hidden; }

/* Film Grain */
body::after { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:9990; opacity:.7; }

/* ─── CURSOR: Lime Magnetic Orb ───── */
#cursor-orb { position:fixed; width:16px; height:16px; background:var(--lime); border-radius:50%; pointer-events:none; z-index:9999; top:0; left:0; transform:translate(-50%,-50%); mix-blend-mode:exclusion; transition:width 0.3s, height 0.3s; }
#cursor-trail { position:fixed; width:40px; height:40px; border:1.5px solid var(--lime); border-radius:50%; pointer-events:none; z-index:9998; top:0; left:0; transform:translate(-50%,-50%); opacity:0.4; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:width 0.4s cubic-bezier(0.19,1,0.22,1), height 0.4s cubic-bezier(0.19,1,0.22,1), opacity 0.3s; }
.cursor-label { font-size:0.45rem; font-weight:700; text-transform:uppercase; color:var(--black); opacity:0; transition:opacity 0.2s; letter-spacing:0.15em; }

body.hovering #cursor-orb { width:60px; height:60px; background:var(--lime); }
body.hovering #cursor-trail { width:0; height:0; opacity:0; }
body.hovering .cursor-label { opacity:1; }

/* ─── PRELOADER ───── */
#preloader { position:fixed; inset:0; background:var(--black); z-index:10000; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end; padding:52px; overflow:hidden; }
#preloader-bar { position:absolute; top:0; left:0; height:3px; background:var(--lime); width:0%; transition:width 0.05s linear; }
#preloader-counter { font-family:'Inter',sans-serif; font-size:clamp(80px,15vw,220px); font-weight:900; line-height:0.85; letter-spacing:-0.06em; color:var(--white); }
#preloader-word { font-size:0.65rem; font-weight:700; letter-spacing:0.5em; text-transform:uppercase; color:var(--lime); margin-bottom:12px; }

/* ─── NAVIGATION ───── */
nav { position:fixed; top:0; left:0; right:0; z-index:500; display:flex; align-items:center; justify-content:space-between; padding:24px 52px; }
.logo { font-family:'Inter',sans-serif; font-size:1rem; font-weight:900; letter-spacing:.2em; text-transform:uppercase; color:var(--white); text-decoration:none; }
.logo span { color:var(--lime); }
.nav-links { display:flex; gap:40px; list-style:none; }
.nav-links a { font-size:.6rem; font-weight:700; letter-spacing:.25em; text-transform:uppercase; color:var(--white); text-decoration:none; opacity:.35; transition:opacity .3s, color 0.3s; }
.nav-links a:hover, .nav-links a.active { opacity:1; color:var(--lime); }

/* ─── MAIN ───── */
main { min-height:100vh; background:var(--black); position:relative; z-index:2; }

/* ─── FOOTER ───── */
.footer-wrap { background:var(--lime); padding:80px 52px 40px; }
.footer-top { display:flex; justify-content:space-between; align-items:flex-end; padding-bottom:60px; border-bottom:1px solid rgba(0,0,0,0.15); margin-bottom:32px; }
.footer-headline { font-family:'Inter',sans-serif; font-size:clamp(48px,8vw,120px); font-weight:900; letter-spacing:-0.04em; text-transform:uppercase; color:var(--black); line-height:0.88; }
.footer-cta-btn { display:inline-block; padding:20px 52px; background:var(--black); color:var(--lime); font-size:.65rem; font-weight:700; letter-spacing:.25em; text-transform:uppercase; text-decoration:none; transition:all 0.3s; }
.footer-cta-btn:hover { background:var(--white); color:var(--black); }
.footer-bar { display:flex; justify-content:space-between; font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:rgba(0,0,0,0.5); }
.footer-bar a { color:inherit; text-decoration:none; }
.footer-bar a:hover { color:var(--black); }

/* ─── UTILITIES ───── */
.magnetic-wrap { display:inline-block; }
.sec-tag { font-size:0.58rem; font-weight:700; letter-spacing:0.4em; text-transform:uppercase; color:var(--lime); margin-bottom:16px; display:block; }
.sec-num { font-size:0.58rem; font-weight:700; letter-spacing:0.3em; color:rgba(245,245,240,0.2); }

/* ─── VARIANT SWITCHER ───── */
.vsw { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; gap:6px; }
.vsw a { width:32px; height:32px; border:1px solid rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:700; color:rgba(255,255,255,.3); text-decoration:none; transition:all .3s; }
.vsw a:hover, .vsw a.cur { background:var(--lime); color:var(--black); border-color:var(--lime); }

{% block extra_css %}{% endblock %}
</style>
</head>
<body>

<!-- Preloader -->
<div id="preloader">
  <div id="preloader-bar"></div>
  <div id="preloader-word">Loading</div>
  <div id="preloader-counter">0</div>
</div>

<!-- Custom Cursor -->
<div id="cursor-orb"></div>
<div id="cursor-trail"><span class="cursor-label">VIEW</span></div>

<nav>
  <a href="{% url 'v1' %}" class="logo magnetic">DMA<span>.</span></a>
  <ul class="nav-links">
    <li class="magnetic-wrap"><a href="{% url 'v1' %}" class="magnetic scramble {% if request.resolver_match.url_name == 'v1' %}active{% endif %}" data-text="Home">Home</a></li>
    <li class="magnetic-wrap"><a href="{% url 'v1_work' %}" class="magnetic scramble {% if 'v1_work' in request.resolver_match.url_name %}active{% endif %}" data-text="Work">Work</a></li>
    <li class="magnetic-wrap"><a href="{% url 'v1_services' %}" class="magnetic scramble {% if request.resolver_match.url_name == 'v1_services' %}active{% endif %}" data-text="Services">Services</a></li>
    <li class="magnetic-wrap"><a href="{% url 'v1_contact' %}" class="magnetic scramble {% if request.resolver_match.url_name == 'v1_contact' %}active{% endif %}" data-text="Contact">Contact</a></li>
  </ul>
</nav>

<main>{% block content %}{% endblock %}</main>

<!-- Footer Parallax Wrapper (Calculated dynamically via JS) -->
<div class="footer-spacer"></div>
<div class="footer-wrap">
  <div class="footer-top">
    <div class="footer-headline">Let's Build<br>The New.</div>
    <a href="{% url 'v1_contact' %}" class="footer-cta-btn magnetic">Start a project &rarr;</a>
  </div>
  <div class="footer-bar">
    <span>&copy; 2026 DMA. Studio</span>
    <div style="display:flex;gap:32px"><a href="#" class="magnetic">IG</a><a href="#" class="magnetic">X</a><a href="#" class="magnetic">LI</a></div>
  </div>
</div>

<div class="vsw">
  <a href="{% url 'v1' %}" class="cur" title="Cinematic">1</a>
  <a href="{% url 'v2' %}" title="Editorial">2</a>
  <a href="{% url 'v3' %}" title="Gradient">3</a>
  <a href="{% url 'v4' %}" title="Type">4</a>
  <a href="{% url 'v5' %}" title="Neon">5</a>
  <a href="{% url 'v6' %}" title="Masterpiece">6</a>
  <a href="{% url 'v7' %}" title="V7 Cybernetic System">7</a>
  <a href="{% url 'v8' %}" title="AlgoPros">8</a>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// 1. Lenis Smooth Scroll
const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), direction: 'vertical', gestureDirection: 'vertical', smooth: true, mouseMultiplier: 1 });
function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
requestAnimationFrame(raf);
// Hook GSAP with Lenis
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time)=>{ lenis.raf(time * 1000) });
gsap.ticker.lagSmoothing(0);

// 2. Preloader — Lime Progress Bar
const preloader = document.getElementById('preloader');
const counter = document.getElementById('preloader-counter');
const bar = document.getElementById('preloader-bar');
let count = 0;
const updateCounter = setInterval(() => {
  count += Math.floor(Math.random() * 8) + 2;
  if (count >= 100) {
    count = 100;
    clearInterval(updateCounter);
    counter.innerText = count;
    bar.style.width = '100%';
    setTimeout(() => {
      gsap.to(preloader, { yPercent: -100, duration: 1.4, ease: "expo.inOut", onComplete: () => {
        preloader.style.display = 'none';
        document.dispatchEvent(new Event('preloaderDone'));
      }});
    }, 400);
  } else {
    counter.innerText = count;
    bar.style.width = count + '%';
  }
}, 28);

// 3. Electric Lime Cursor
const cursorOrb = document.getElementById('cursor-orb');
const cursorTrail = document.getElementById('cursor-trail');
const cursorLabel = document.querySelector('.cursor-label');
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let orbX = mouseX, orbY = mouseY, trailX = mouseX, trailY = mouseY;
window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
function animateCursor() {
  orbX += (mouseX - orbX) * 0.25;
  orbY += (mouseY - orbY) * 0.25;
  trailX += (mouseX - trailX) * 0.08;
  trailY += (mouseY - trailY) * 0.08;
  gsap.set(cursorOrb,   { x: orbX,   y: orbY   });
  gsap.set(cursorTrail, { x: trailX, y: trailY });
  requestAnimationFrame(animateCursor);
}
animateCursor();

function initHoverCursor() {
  document.querySelectorAll('[data-cursor]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      document.body.classList.add('hovering');
      if (cursorLabel) cursorLabel.innerText = el.getAttribute('data-cursor');
    });
    el.addEventListener('mouseleave', () => {
      document.body.classList.remove('hovering');
    });
  });
}
initHoverCursor();

// 4. Magnetic Buttons/Links
function initMagnetic() {
  document.querySelectorAll('.magnetic').forEach(el => {
    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      gsap.to(el, { x: x * 0.35, y: y * 0.35, duration: 0.4, ease: "power2.out" });
    });
    el.addEventListener('mouseleave', () => {
      gsap.to(el, { x: 0, y: 0, duration: 0.7, ease: "elastic.out(1, 0.3)" });
    });
  });
}
initMagnetic();

// 5. Text Scramble
const chars = '!<>-_\\/[]{}—=+*^?#_';
document.querySelectorAll('.scramble').forEach(el => {
  el.addEventListener('mouseenter', () => {
    let text = el.getAttribute('data-text') || el.innerText;
    if (!el.getAttribute('data-text')) el.setAttribute('data-text', text);
    let iterations = 0;
    const interval = setInterval(() => {
      el.innerText = text.split('').map((letter, index) => {
        if (index < iterations) return text[index];
        return chars[Math.floor(Math.random() * chars.length)];
      }).join('');
      if (iterations >= text.length) clearInterval(interval);
      iterations += 1 / 3;
    }, 30);
  });
});
</script>

{% block extra_js %}{% endblock %}
</body></html>
