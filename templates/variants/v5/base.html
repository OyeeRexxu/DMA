{% load static %}<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}DMA. — Cyberpunk Agency{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<!-- Lenis CSS -->
<style>
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: hidden; }
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--r:#ff3b3b;--rd:rgba(255,59,59,.15)}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Inter',sans-serif;cursor:none;overflow-x:hidden}

/* ── V5 CURSOR: NEON CYBERPUNK RETICLE ── */
#cur-ch,#cur-cv,#cur-rect,#cur-lbl,.cur-tr{position:fixed;pointer-events:none}
#cur-ch{z-index:10000;width:22px;height:1px;background:var(--r);box-shadow:0 0 8px var(--r);transform:translate(-50%,-50%)}
#cur-cv{z-index:10000;width:1px;height:22px;background:var(--r);box-shadow:0 0 8px var(--r);transform:translate(-50%,-50%)}
#cur-rect{z-index:9998;width:38px;height:38px;border:1px solid rgba(255,59,59,.5);transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(255,59,59,.2),inset 0 0 12px rgba(255,59,59,.04);transition:width .38s cubic-bezier(.16,1,.3,1),height .38s cubic-bezier(.16,1,.3,1),border-color .25s,box-shadow .25s,transform .25s}
#cur-lbl{z-index:10001;font-family:'Inter',sans-serif;font-size:7px;font-weight:800;letter-spacing:.28em;text-transform:uppercase;color:var(--r);white-space:nowrap;text-shadow:0 0 10px var(--r);opacity:0;transition:opacity .18s;transform:translateY(-50%)}
.cur-tr{border:1px solid rgba(255,59,59,.1);transform:translate(-50%,-50%);opacity:0;transition:opacity .3s}
#tr-a{z-index:9997;width:56px;height:56px}
#tr-b{z-index:9996;width:76px;height:76px;border-color:rgba(255,59,59,.05)}
@keyframes neonPulse{0%,100%{box-shadow:0 0 12px rgba(255,59,59,.2)}50%{box-shadow:0 0 28px rgba(255,59,59,.55),inset 0 0 18px rgba(255,59,59,.1)}}
/* Mobile: restore native cursor */
@media(hover:none),(pointer:coarse){body{cursor:auto!important}#cur-ch,#cur-cv,#cur-rect,#cur-lbl,#tr-a,#tr-b{display:none!important}}

/* Grid Overlay */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);background-size:40px 40px;pointer-events:none;z-index:9990;opacity:.5}

/* Navigation */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:26px 52px;background:rgba(10,10,10,.8);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,59,59,.15)}
.logo{font-size:1rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#fff;text-decoration:none}
.logo b{color:var(--r)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none;transition:color .3s}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-cta{padding:12px 28px;border:1px solid var(--r);color:var(--r);font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;transition:background .3s,color .3s;flex-shrink:0}
.nav-cta:hover{background:var(--r);color:#fff;box-shadow:0 0 20px rgba(255,59,59,.4)}

main{min-height:100vh; position:relative; z-index:2;}

/* Buttons */
.btn-r{padding:18px 48px;background:var(--r);color:#fff;font-size:.7rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;display:inline-block;transition:all .3s;border:none;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 0 20px rgba(255,59,59,.2)}
.btn-r:hover{background:#fff;color:#000;box-shadow:0 0 30px rgba(255,255,255,.4)}

footer{padding:100px 52px 0;border-top:1px solid rgba(255,59,59,.15);background:#050505;}
.footer-cta{display:flex;align-items:center;justify-content:space-between;padding-bottom:80px;gap:48px}
.footer-cta h2{font-size:clamp(48px,7vw,96px);font-weight:900;letter-spacing:-.04em;text-transform:uppercase;line-height:.9}
.footer-cta h2 span{color:var(--r)}
.fbar{display:flex;justify-content:space-between;padding:24px 0;border-top:1px solid rgba(255,255,255,.04);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2)}
.fbar a{color:inherit;text-decoration:none;transition:color .3s}.fbar a:hover{color:var(--r)}

.vsw{position:fixed;bottom:24px;right:24px;z-index:999;display:flex; flex-wrap:wrap; justify-content:flex-end; max-width:90vw;gap:5px}
.vsw a{width:32px;height:32px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:rgba(255,255,255,.3);text-decoration:none;transition:all .3s;background:#050505}
.vsw a:hover,.vsw a.cur{background:var(--r);color:#fff;border-color:var(--r)}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* Mobile responsive base */
@media(max-width:768px){nav{padding:18px 24px}.nav-links{gap:18px}.nav-links a{font-size:.58rem}.nav-cta{padding:10px 18px;font-size:.6rem}footer{padding:80px 24px 0}.footer-cta{flex-direction:column;gap:32px;align-items:flex-start}.footer-cta h2{font-size:clamp(40px,10vw,72px)}.fbar{flex-direction:column;gap:10px;align-items:flex-start}}
@media(max-width:480px){nav{padding:14px 16px}.nav-links{display:none}.nav-cta{padding:10px 16px;font-size:.58rem}footer{padding:60px 16px 0}.vsw{bottom:14px;right:14px}}

{% block extra_css %}{% endblock %}
</style></head>
<body>

<div id="tr-b" class="cur-tr"></div>
<div id="tr-a" class="cur-tr"></div>
<div id="cur-rect"></div>
<div id="cur-ch"></div>
<div id="cur-cv"></div>
<div id="cur-lbl"></div>

<nav>
  <a href="{% url 'v5' %}" class="logo">DMA<b>.</b></a>
  <ul class="nav-links">
    <li><a href="{% url 'v5' %}" {% if request.resolver_match.url_name == 'v5' %}class="active"{% endif %}>Home</a></li>
    <li><a href="{% url 'v5_work' %}" {% if 'v5_work' in request.resolver_match.url_name %}class="active"{% endif %}>Work</a></li>
    <li><a href="{% url 'v5_services' %}" {% if request.resolver_match.url_name == 'v5_services' %}class="active"{% endif %}>Services</a></li>
  </ul>
  <a href="{% url 'v5_contact' %}" class="nav-cta" data-cursor="TALK">Contact us</a>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer>
  <div class="footer-cta"><h2>Let's<br><span>Talk.</span></h2><a href="{% url 'v5_contact' %}" class="btn-r" data-cursor="START">Start a project →</a></div>
  <div class="fbar"><span>© 2026 DMA. Cyberpunk</span><div style="display:flex;gap:20px"><a href="#">IG</a><a href="#">X</a><a href="#">LI</a></div></div>
</footer>

<div class="vsw"><a href="{% url 'v1' %}" title="Cinematic">1</a><a href="{% url 'v3' %}" title="Gradient">3</a><a href="{% url 'v4' %}" title="Type">4</a><a href="{% url 'v5' %}" class="cur" title="Neon">5</a><a href="{% url 'v8' %}" title="AlgoPros">8</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

// Lenis
const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), direction: 'vertical', smooth: true });
function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
requestAnimationFrame(raf);
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time)=>{ lenis.raf(time * 1000) });
gsap.ticker.lagSmoothing(0);

/* ══ V5 CURSOR: NEON CYBERPUNK RETICLE ══ */
const _isTouch = window.matchMedia('(hover:none),(pointer:coarse)').matches;
if (!_isTouch) {
  const cH  = document.getElementById('cur-ch');
  const cV  = document.getElementById('cur-cv');
  const cR  = document.getElementById('cur-rect');
  const cL  = document.getElementById('cur-lbl');
  const trA = document.getElementById('tr-a');
  const trB = document.getElementById('tr-b');
  let mx = innerWidth/2, my = innerHeight/2;
  let rx = mx, ry = my, ax = mx, ay = my, bx = mx, by = my;
  let vis = false, idleT;

  function showC() { if(vis)return; vis=true; [cH,cV,cR,trA,trB].forEach(e=>e.style.opacity='1'); }
  function resetIdle() {
    clearTimeout(idleT); cR.style.animation='none';
    idleT = setTimeout(()=>{ cR.style.animation='neonPulse 1.6s ease-in-out infinite'; }, 2400);
  }

  window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; showC(); resetIdle(); }, {passive:true});

  document.addEventListener('mousedown', () => {
    cR.style.transform='translate(-50%,-50%) scale(.55)';
    /* neon burst particles */
    for(let i=0;i<9;i++){
      const p=document.createElement('div'), a=(i/9)*Math.PI*2, d=22+Math.random()*32;
      p.style.cssText=`position:fixed;pointer-events:none;z-index:9997;width:2px;height:2px;background:var(--r);box-shadow:0 0 6px var(--r);border-radius:50%;left:${mx}px;top:${my}px;transform:translate(-50%,-50%);transition:all .55s cubic-bezier(.16,1,.3,1)`;
      document.body.appendChild(p);
      requestAnimationFrame(()=>{p.style.left=(mx+Math.cos(a)*d)+'px';p.style.top=(my+Math.sin(a)*d)+'px';p.style.opacity='0';});
      setTimeout(()=>p.remove(), 600);
    }
  });
  document.addEventListener('mouseup', () => { cR.style.transform='translate(-50%,-50%) scale(1)'; });
  document.addEventListener('mouseleave', ()=>{ [cH,cV,cR,trA,trB,cL].forEach(e=>{if(e)e.style.opacity='0'}); });
  document.addEventListener('mouseenter', ()=>{ [cH,cV,cR,trA,trB].forEach(e=>{if(e)e.style.opacity='1'}); });

  (function loop(){
    cH.style.left=mx+'px'; cH.style.top=my+'px';
    cV.style.left=mx+'px'; cV.style.top=my+'px';
    rx+=(mx-rx)*.13; ry+=(my-ry)*.13;
    cR.style.left=rx+'px'; cR.style.top=ry+'px';
    if(cL){ cL.style.left=(rx+24)+'px'; cL.style.top=ry+'px'; }
    ax+=(rx-ax)*.07; ay+=(ry-ay)*.07;
    if(trA){ trA.style.left=ax+'px'; trA.style.top=ay+'px'; }
    bx+=(ax-bx)*.05; by+=(ay-by)*.05;
    if(trB){ trB.style.left=bx+'px'; trB.style.top=by+'px'; }
    requestAnimationFrame(loop);
  })();

  function setCursorHover(label) {
    cR.style.width='78px'; cR.style.height='36px';
    cR.style.borderColor='var(--r)';
    cR.style.boxShadow='0 0 22px rgba(255,59,59,.5),inset 0 0 18px rgba(255,59,59,.08)';
    cH.style.opacity='.0'; cV.style.opacity='.0';
    if(cL){ cL.textContent=label; cL.style.opacity='1'; }
    if(trA)trA.style.opacity='.08'; if(trB)trB.style.opacity='.04';
  }
  function setCursorLink() {
    cR.style.width='54px'; cR.style.height='54px';
    cR.style.borderColor='rgba(255,59,59,.7)';
    cR.style.boxShadow='0 0 16px rgba(255,59,59,.35)';
  }
  function resetCursor() {
    cR.style.width='38px'; cR.style.height='38px';
    cR.style.borderColor='rgba(255,59,59,.5)';
    cR.style.boxShadow='0 0 12px rgba(255,59,59,.2),inset 0 0 12px rgba(255,59,59,.04)';
    cH.style.opacity='1'; cV.style.opacity='1';
    if(cL)cL.style.opacity='0';
    if(trA)trA.style.opacity='1'; if(trB)trB.style.opacity='1';
  }

  document.addEventListener('mouseover', e => {
    const labeled = e.target.closest('[data-cursor]');
    const linked  = !labeled && e.target.closest('a,button,.svc-row,.faq-q,.wcard,.w-row-item,.creator-card');
    if(labeled) setCursorHover(labeled.dataset.cursor);
    else if(linked) setCursorLink();
  });
  document.addEventListener('mouseout', e => {
    const el = e.target.closest('[data-cursor],a,button,.svc-row,.faq-q,.wcard,.w-row-item,.creator-card');
    if(el && !e.relatedTarget?.closest('[data-cursor],a,button,.svc-row,.faq-q,.wcard,.w-row-item,.creator-card')) resetCursor();
  });
}
/* expose for pages that call initHoverCursor */
window.initHoverCursor = function(){};
</script>
{% block extra_js %}{% endblock %}
</body></html>
