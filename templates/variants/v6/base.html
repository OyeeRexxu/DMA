{% load static %}<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}DMA. — The Masterpiece{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<!-- Lenis CSS -->
<style>
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: hidden; }
</style>
<style>
/* Global Reset & Base */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#f0f0f0;font-family:'Inter',sans-serif;cursor:none;overflow-x:hidden}

/* Vanta WebGL Background */
#vanta-bg { position: fixed; inset: 0; z-index: -2; pointer-events: none; }

/* Custom Cursor */
#cursor-dot { position:fixed; width:8px; height:8px; background:#fff; border-radius:50%; pointer-events:none; z-index:9999; top:0; left:0; transform:translate(-50%,-50%); transition:transform 0.15s, background 0.15s; mix-blend-mode:difference; }
#cursor-ring { position:fixed; width:36px; height:36px; border:1px solid rgba(255,255,255,0.4); border-radius:50%; pointer-events:none; z-index:9998; top:0; left:0; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; overflow:hidden; mix-blend-mode:difference; transition: width 0.3s, height 0.3s, background 0.3s, border-color 0.3s; }
.cursor-text { font-size:0.55rem; font-weight:800; text-transform:uppercase; color:#050505; opacity:0; transition:opacity 0.2s; letter-spacing:0.1em; pointer-events:none; }
/* Cursor States */
body.hovering #cursor-dot { transform:translate(-50%,-50%) scale(0); }
body.hovering #cursor-ring { width:80px; height:80px; background:#fff; border-color:#fff; mix-blend-mode:normal; }
body.hovering .cursor-text { opacity:1; }

/* Page Transition Wipe */
#page-wipe { position:fixed; top:100%; left:0; width:100%; height:100vh; background:#fff; z-index:99999; pointer-events:none; }

/* Navigation */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:26px 60px;mix-blend-mode:difference}
.logo{font-size:1rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#fff;text-decoration:none}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#fff;text-decoration:none;opacity:.45;transition:opacity .3s}
.nav-links a:hover,.nav-links a.active{opacity:1}

/* Main Content */
main{min-height:100vh; opacity:0; transform:translateY(20px); transition:opacity 0.8s, transform 0.8s; }
main.loaded { opacity:1; transform:translateY(0); }

/* Magnetic Area */
.magnetic-wrap { display:inline-block; }

.vsw{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;gap:5px}
.vsw a{width:32px;height:32px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:rgba(255,255,255,.4);text-decoration:none;transition:all .3s}
.vsw a:hover,.vsw a.cur{background:#fff;color:#000;border-color:#fff}

{% block extra_css %}{% endblock %}
</style>
</head>
<body>

<!-- WebGL Background -->
<div id="vanta-bg"></div>

<!-- Page Transition Wipe -->
<div id="page-wipe"></div>

<!-- Custom Cursor -->
<div id="cursor-dot"></div>
<div id="cursor-ring"><span class="cursor-text">VIEW</span></div>

<nav>
  <a href="{% url 'v6' %}" class="logo magnetic" data-swup>DMA.</a>
  <ul class="nav-links">
    <li class="magnetic-wrap"><a href="{% url 'v6' %}" class="magnetic {% if request.resolver_match.url_name == 'v6' %}active{% endif %}" data-swup>Home</a></li>
    <li class="magnetic-wrap"><a href="{% url 'v6_work' %}" class="magnetic {% if 'v6_work' in request.resolver_match.url_name %}active{% endif %}" data-swup>Work</a></li>
    <li class="magnetic-wrap"><a href="{% url 'v6_services' %}" class="magnetic {% if request.resolver_match.url_name == 'v6_services' %}active{% endif %}" data-swup>Services</a></li>
    <li class="magnetic-wrap"><a href="{% url 'v6_contact' %}" class="magnetic {% if request.resolver_match.url_name == 'v6_contact' %}active{% endif %}" data-swup>Contact</a></li>
  </ul>
</nav>

<div id="swup-container">
  <main class="loaded">
    {% block content %}{% endblock %}
  </main>
</div>

<div class="vsw">
  <a href="{% url 'v1' %}" title="Cinematic">1</a>
  
  <a href="{% url 'v3' %}" title="Gradient">3</a>
  <a href="{% url 'v4' %}" title="Type">4</a>
  <a href="{% url 'v5' %}" title="Neon">5</a>
  <a href="{% url 'v6' %}" class="cur" title="Masterpiece">6</a>
  
  <a href="{% url 'v8' %}" title="AlgoPros">8</a>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<!-- Three.js for Vanta -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

// 1. Lenis Smooth Scroll
const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), direction: 'vertical', smooth: true });
function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
requestAnimationFrame(raf);
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time)=>{ lenis.raf(time * 1000) });
gsap.ticker.lagSmoothing(0);

// 2. Vanta Fog WebGL Background
VANTA.FOG({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  highlightColor: 0x333333,
  midtoneColor: 0x111111,
  lowlightColor: 0x0,
  baseColor: 0x050505,
  blurFactor: 0.9,
  speed: 1.5,
  zoom: 1.5
});

// 3. Custom Cursor
const cursorDot = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
const cursorText = document.querySelector('.cursor-text');
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let dotX = mouseX, dotY = mouseY, ringX = mouseX, ringY = mouseY;
window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
function animateCursor() {
  dotX += (mouseX - dotX) * 0.2;
  dotY += (mouseY - dotY) * 0.2;
  ringX += (mouseX - ringX) * 0.1;
  ringY += (mouseY - ringY) * 0.1;
  gsap.set(cursorDot, { x: dotX, y: dotY });
  gsap.set(cursorRing, { x: ringX, y: ringY });
  requestAnimationFrame(animateCursor);
}
animateCursor();

function initHoverCursor() {
  document.querySelectorAll('[data-cursor]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      document.body.classList.add('hovering');
      cursorText.innerText = el.getAttribute('data-cursor');
      cursorText.style.color = '#000';
    });
    el.addEventListener('mouseleave', () => {
      document.body.classList.remove('hovering');
    });
  });
}
initHoverCursor();

// 4. Magnetic Buttons/Links
function initMagnetic() {
  const magneticEls = document.querySelectorAll('.magnetic');
  magneticEls.forEach((el) => {
    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      gsap.to(el, { x: x * 0.4, y: y * 0.4, duration: 0.4, ease: "power2.out" });
    });
    el.addEventListener('mouseleave', () => {
      gsap.to(el, { x: 0, y: 0, duration: 0.7, ease: "elastic.out(1, 0.3)" });
    });
  });
}
initMagnetic();

// 5. Seamless Page Transitions (Vanilla JS Intercept)
document.addEventListener('click', e => {
  const link = e.target.closest('a[data-swup]');
  if(link && link.href && link.hostname === window.location.hostname) {
    e.preventDefault();
    const targetUrl = link.href;
    
    // Animate wipe up
    gsap.to('#page-wipe', { top: 0, duration: 0.6, ease: "power4.inOut", onComplete: () => {
      fetch(targetUrl)
        .then(res => res.text())
        .then(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const newMain = doc.querySelector('main');
          
          document.querySelector('main').innerHTML = newMain.innerHTML;
          window.history.pushState({}, '', targetUrl);
          
          // Re-init scripts
          ScrollTrigger.getAll().forEach(t => t.kill());
          initHoverCursor();
          initMagnetic();
          if(window.pageSpecificInit) window.pageSpecificInit();
          
          // Wipe down
          gsap.to('#page-wipe', { top: '-100%', duration: 0.6, ease: "power4.inOut", onComplete: () => {
            gsap.set('#page-wipe', { top: '100%' });
          }});
          window.scrollTo(0,0);
        });
    }});
  }
});
</script>

{% block extra_js %}{% endblock %}
</body></html>
