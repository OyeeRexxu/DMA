{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ALGOPROS // Machine Learning Web Portal{% endblock %}</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-obsidian: #03040b;
            --c-cyan: #00e5ff;
            --c-violet: #9d4edd;
            --c-royal: #0a0e2a;
            --font-sans: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        html, body {
            background-color: var(--bg-obsidian);
            color: #ffffff;
            font-family: var(--font-sans);
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            cursor: none;
        }

        /* Ambient Glowing Background Layers over the entire website */
        .ambient-glow-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #0d0f30 0%, #020309 100%);
            pointer-events: none;
        }

        .ambient-aurora {
            position: absolute;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(140px);
            mix-blend-mode: screen;
            opacity: 0.45;
            pointer-events: none;
        }

        .aurora-1 {
            top: -10%;
            left: 10%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.22) 0%, transparent 70%);
            animation: floatAurora1 20s infinite alternate;
        }

        .aurora-2 {
            bottom: -10%;
            right: 10%;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.18) 0%, transparent 70%);
            animation: floatAurora2 22s infinite alternate;
        }

        @keyframes floatAurora1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.15); }
        }

        @keyframes floatAurora2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-10%, -10%) scale(1.2); }
        }

        /* Dual-Ring Cursor System with context text badge */
        #algopros-cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        #algopros-cursor-glow {
            position: fixed;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1), 
                        height 0.3s cubic-bezier(0.19, 1, 0.22, 1), 
                        border-color 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cursor-badge {
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: #000000;
            font-weight: 700;
            letter-spacing: 0.05em;
            opacity: 0;
            transition: opacity 0.2s;
            text-transform: uppercase;
        }

        body.hovering #algopros-cursor-dot {
            background: var(--c-cyan);
            transform: translate(-50%, -50%) scale(1.5);
        }

        body.hovering #algopros-cursor-glow {
            width: 72px;
            height: 72px;
            border-color: var(--c-cyan);
            background: rgba(0, 229, 255, 0.95);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        body.hovering #cursor-badge {
            opacity: 1;
        }

        /* Glass preloader */
        #preloader {
            position: fixed;
            inset: 0;
            background: #020309;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #preloader.hide {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
        }

        .pre-ring {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pre-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--c-cyan);
            animation: rotatePre 1s linear infinite;
        }

        @keyframes rotatePre {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #pre-percent {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* Full Width Widescreen Sticky Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            background: rgba(2, 3, 9, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #ffffff;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
        }

        .logo-polyhedron {
            width: 32px;
            height: 32px;
            stroke: var(--c-cyan);
            fill: none;
            stroke-width: 1.5;
            animation: spinPoly 6s linear infinite;
        }

        @keyframes spinPoly {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.55);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--c-cyan);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        /* Scroll Progress Bar spanning entire top viewport */
        .scroll-progress-container {
            position: fixed;
            top: 93px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.02);
            z-index: 999;
        }

        .scroll-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--c-cyan), var(--c-violet));
            box-shadow: 0 0 10px var(--c-cyan);
        }

        /* Universal Switcher Overlay */
        .vsw {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 9999;
            display: flex; flex-wrap:wrap; justify-content:flex-end; max-width:90vw;
            gap: 6px;
        }

        .vsw a {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .vsw a:hover, .vsw a.cur {
            background: var(--c-cyan);
            color: #000;
            border-color: var(--c-cyan);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.45);
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <!-- Ambient glowing backgrounds spanning full viewport -->
    <div class="ambient-glow-container">
        <div class="ambient-aurora aurora-1"></div>
        <div class="ambient-aurora aurora-2"></div>
    </div>

    <!-- AlgoPros Cursor Event System -->
    <div id="algopros-cursor-dot"></div>
    <div id="algopros-cursor-glow">
        <span id="cursor-badge"></span>
    </div>

    <!-- Preloader -->
    <div id="preloader">
        <div class="pre-ring">
            <div id="pre-percent">00</div>
        </div>
    </div>

    <!-- Navigation Sticky Header -->
    <header>
        <a href="{% url 'v8' %}" class="logo-wrap" data-cursor data-cursor-text="HOME">
            <svg class="logo-polyhedron" viewBox="0 0 100 100">
                <polygon points="50,15 85,35 85,75 50,95 15,75 15,35" stroke-dasharray="10 5" />
                <line x1="50" y1="15" x2="50" y2="95" />
                <line x1="15" y1="35" x2="85" y2="75" />
                <line x1="15" y1="75" x2="85" y2="35" />
            </svg>
            <span>ALGOPROS</span>
        </a>
        <ul class="nav-links">
            <li><a href="#section-hero" class="active" data-cursor data-cursor-text="HERO">Home</a></li>
            <li><a href="#section-modules" data-cursor data-cursor-text="MODULES">Modules</a></li>
            <li><a href="#section-telemetry" data-cursor data-cursor-text="TELEMETRY">Telemetry</a></li>
            <li><a href="#section-pricing" data-cursor data-cursor-text="PRICING">Pricing</a></li>
            <li><a href="#section-terminal" data-cursor data-cursor-text="TERMINAL">Terminal</a></li>
        </ul>
    </header>

    <!-- Scroll Progress Indicator -->
    <div class="scroll-progress-container">
        <div class="scroll-progress-bar" id="scroll-progress"></div>
    </div>

    <!-- Full-Width Page View block -->
    <main style="width: 100%; position: relative; z-index: 10; padding-top: 94px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Variant Switcher -->
    <div class="vsw">
        <a href="{% url 'v1' %}" title="Cinematic">1</a>
        <a href="{% url 'v3' %}" title="Gradient">3</a>
        <a href="{% url 'v4' %}" title="Type">4</a>
        <a href="{% url 'v5' %}" title="Neon">5</a>
        <a href="{% url 'v8' %}" class="cur" title="AlgoPros">8</a>
  <span style="width: 1px; height: 18px; background: rgba(255,255,255,0.2); margin: 0 3px; align-self: center;"></span>
  <a href="{% url 'v9:home' %}" title="Pulse">9</a>
  <a href="{% url 'v10:home' %}" title="Atelier">10</a>
  <a href="{% url 'v11:home' %}" title="Orbit">11</a>
  <a href="{% url 'v12:home' %}" title="Signal">12</a>
  <a href="{% url 'v13:home' %}" title="Quiet">13</a>
</div>

    <!-- Core CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Lenis ultra-buttery smooth scroll — GSAP ticker integration only (no duplicate RAF)
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true
        });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);

        // Dual Cursor tracking system
        const cursorDot = document.getElementById('algopros-cursor-dot');
        const cursorGlow = document.getElementById('algopros-cursor-glow');
        const cursorBadge = document.getElementById('cursor-badge');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let dotX = mouseX, dotY = mouseY, glowX = mouseX, glowY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            dotX += (mouseX - dotX) * 0.25;
            dotY += (mouseY - dotY) * 0.25;
            glowX += (mouseX - glowX) * 0.08;
            glowY += (mouseY - glowY) * 0.08;

            gsap.set(cursorDot, { x: dotX, y: dotY });
            gsap.set(cursorGlow, { x: glowX, y: glowY });

            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Advanced high-fidelity cursor events
        function bindCursorEvents() {
            document.querySelectorAll('[data-cursor]').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    document.body.classList.add('hovering');
                    const text = el.getAttribute('data-cursor-text') || 'SELECT';
                    cursorBadge.innerText = text;
                });
                el.addEventListener('mouseleave', () => {
                    document.body.classList.remove('hovering');
                    cursorBadge.innerText = '';
                });
            });
        }
        bindCursorEvents();

        // Scroll progress bar via GSAP ScrollTrigger (compatible with Lenis)
        gsap.to('#scroll-progress', {
            width: '100%',
            ease: 'none',
            scrollTrigger: {
                trigger: 'body',
                start: 'top top',
                end: 'bottom bottom',
                scrub: 0.3
            }
        });

        // Update active nav link on Lenis scroll
        lenis.on('scroll', () => {
            document.querySelectorAll('main section').forEach(sec => {
                const rect = sec.getBoundingClientRect();
                const offset = 150;
                if (rect.top <= offset && rect.bottom >= offset) {
                    const id = sec.getAttribute('id');
                    document.querySelectorAll('.nav-links a').forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === '#' + id) {
                            link.classList.add('active');
                        }
                    });
                }
            });
        });

        // Click smooth scroll navigation links
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = link.getAttribute('href');
                const targetEl = document.querySelector(targetId);
                if (targetEl) {
                    lenis.scrollTo(targetEl, { offset: -94 });
                }
            });
        });

        // Preloader countdown — bulletproof CSS transition approach
        const preloader = document.getElementById('preloader');
        const prePercent = document.getElementById('pre-percent');
        let prog = 0;
        const interval = setInterval(() => {
            prog += Math.floor(Math.random() * 8) + 2;
            if (prog >= 100) {
                prog = 100;
                clearInterval(interval);
                prePercent.innerText = '100';
                setTimeout(() => {
                    preloader.classList.add('hide');
                    // Remove from DOM after transition
                    setTimeout(() => {
                        preloader.style.display = 'none';
                        document.dispatchEvent(new Event('preloaderDone'));
                    }, 850);
                }, 300);
            } else {
                prePercent.innerText = prog.toString().padStart(2, '0');
            }
        }, 20);
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
